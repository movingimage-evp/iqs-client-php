name: Check for Vulnerabilities
on:
  pull_request:
    types: [edited, opened, synchronize, reopened]
    branches:
      - main

jobs:
  vulnerability-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"

      - name: Run Snyk Security Scanner
        uses: movingimage-evp/github-actions/security/setup@4167982277ce5b9a6090a13fc9fe353d6a62ec8f # main
        with:
          github-packages-token: ${{ secrets.PACKAGES_MI_MAVEN_REPOSITORY_ACCESS_TOKEN }}
          snyk-token: ${{ secrets.SNYK_API_KEY }}
          code-severity-threshold: "medium"
          test-severity-threshold: "critical"
