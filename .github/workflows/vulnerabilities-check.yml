name: Check for Vulnerabilities
on:
  pull_request:
    types: [edited, opened, synchronize, reopened]
    branches:
      - main

jobs:
  vulnerability-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"

      - name: Run Snyk Security Scanner
        uses: movingimage-evp/github-actions/security/setup@7c3a5c746fd40409d1d81add40a11e92abb7662a # main
        with:
          github-packages-token: ${{ secrets.PACKAGES_MI_MAVEN_REPOSITORY_ACCESS_TOKEN }}
          snyk-token: ${{ secrets.SNYK_API_KEY }}
          code-severity-threshold: "medium"
          test-severity-threshold: "critical"
